<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转中...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .loading { 
            background: white; 
            padding: 40px 60px; 
            border-radius: 16px; 
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .loading h2 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .loading p { color: #666; font-size: 14px; }
        .spinner {
            width: 40px; height: 40px;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h2>正在跳转...</h2>
        <p>请稍候，即将跳转到目标页面</p>
    </div>
    <script>
    const channelConfig = {
        "yangfanyun": { url: "https://yawtt.net/register?code=HVXnsvjS", code: "" },
        "jfcloud": { url: "https://j134.net/?code=84kN", code: "" },
        "dageyun": { url: "https://aff02.dgy02.com/#/register?code=xx1H4eEq", code: "" },
        "flashfox": { url: "https://ct.shuaifeng.xin/flashfox", code: "xin-12345678" },
        "fatcatcloud": { url: "https://ct.shuaifeng.xin/fatcatcloud", code: "xin-12345678" },
        "cyberguard": { url: "https://ct.shuaifeng.xin/cyberguard", code: "xin-12345678" },
        "totorocloud": { url: "https://inv06.lmaff01.cc/register?aff=GJHswqNR", code: "" },
        "qingyunti": { url: "https://ivt02.qytaff.cc/register?aff=MQI5Dtgq", code: "" },
        "flyingbird": { url: "https://fbinv02.fbaff.cc/auth/register?code=xDz12ABq", code: "" },
        "gougouvpn": { url: "https://go.dginv.click/#/register?code=jfwEvTa6", code: "" }
    };
    const params = new URLSearchParams(window.location.search);
    const channel = params.get('channel');
    if (channel && channelConfig[channel]) {
        const config = channelConfig[channel];
        let targetUrl = config.url;
        if (config.code) {
            targetUrl += (targetUrl.includes('?') ? '&' : '?') + 'r=' + config.code;
        }
        window.location.href = targetUrl;
    } else {
        document.querySelector('h2').textContent = '无效的链接';
        document.querySelector('p').textContent = '请检查链接是否正确';
    }
    </script>
</body>
</html>
